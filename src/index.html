<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Epic</title>
        <style>
            #canvas { border: 1px solid black; width: 100%; height: 80vh }
            #parameter-slider { width: 50% }
        </style>
    </head>
    <body>
        <div id="controls">
            <button type="reset" id="clear-button">Clear</button>
            <span>Save points:</span>&nbsp;<button type="button" id="save-points-raw-button">Raw</button>&nbsp;<button type="button" id="save-points-b64-button">b64</button>
            <span>Save components:</span>&nbsp;<button type="button" id="save-components-raw-button">Raw</button>&nbsp;<button type="button" id="save-components-b64-button">b64</button>
			<label>Depth:&nbsp;<input type="number" min="0" max="4095" value="0" id="complexity-number"></label>
			<label>Fft:&nbsp;<input type="number" min="2" max="4096" value="0" id="fft-number" onkeydown="return false"></label>
            <input type="range" min="0" max="4095" value="0" id="parameter-slider">
            <input type="number" min="0" max="4095" value="0" id="complexity-number">
            <input type="number" min="2" max="4095" value="0" id="fft-number" onkeydown="return false"><label for="fft-number">bla fft:</label>
            <input type="checkbox" id="complexity-circles-check"><label for="complexity-circles-check">Show complexity circles</label>
			<div id="player">
				<input type="checkbox" id="autoplay-parameter-check"><label for="autoplay-parameter-check">Play</label>
				<input type="range" min="0" max="4096" value="0" id="parameter-slider">
				<input type="checkbox" id="repeatplay-parameter-check"><label for="recycle-parameter-check">Repeat</label>
			</div>
            <input type="checkbox" id="points-steps-check"><label for="points-steps-check" id="points-steps-check-label">Steps by points</label><label for="points-steps-check" id="points-steps-check-point" hidden>x;y</label>
        </div>
        <canvas id="canvas"></canvas>
        <script type="module" src="index.ts"></script>
    </body>
</html>

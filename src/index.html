<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Epic</title>
		<style>
			#canvas { border: 1px solid black; width: 100%; height: 80vh }
			#parameter-slider { width: 50% }
		</style>
	</head>
	<body>
		<div id="controls">
			<button type="reset" id="clear-button">Clear</button>
			<button type="button" id="save-points-button">Save points</button>
			<button type="button" id="save-components-button" hidden>Save components</button>
			<label>Depth:&nbsp;<input type="number" min="0" value="0" id="complexity-number"></label>
			<label>Fft:&nbsp;<input type="number" min="2" value="0" id="fft-number" onkeydown="return false"></label>
			<input type="checkbox" id="complexity-circles-check"><label for="complexity-circles-check">Show complexity circles</label>
			<div id="player">
				<input type="checkbox" id="autoplay-parameter-check"><label for="autoplay-parameter">Play</label>
				<input type="range" min="0" max="4096" value="0" id="parameter-slider">
				<input type="checkbox" id="repeatplay-parameter-check"><label for="recycle-parameter">Repeat</label>
			</div>
		</div>
		<canvas id="canvas"></canvas>
		<script src="index.ts"></script>
	</body>
</html>
